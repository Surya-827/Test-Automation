# GitLab CI/CD Pipeline Configuration
# For Playwright Amazon Advanced Tests - Only PlayStation 5 Search Tests

stages:
  - install
  - test
  - report

variables:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "0"
  CI: "true"

# Install dependencies
install:dependencies:
  stage: install
  image: node:18-alpine
  script:
    - echo "Installing dependencies..."
    - npm ci
    - echo "Installing Playwright browsers..."
    - npx playwright install --with-deps chromium
  artifacts:
    paths:
      - node_modules/
      - .playwright/
    expire_in: 1 hour
  cache:
    paths:
      - node_modules/
      - .playwright/
  only:
    - main
    - master
    - develop
    - merge_requests

# Run ONLY PlayStation 5 Search Tests (02 & 03)
test:playstation:search:
  stage: test
  image: node:18-alpine
  dependencies:
    - install:dependencies
  before_script:
    - npm ci --prefer-offline --no-audit
    - npx playwright install --with-deps chromium
  script:
    - echo "═══════════════════════════════════════════════════════════"
    - echo "Running PlayStation 5 Search Test Suite"
    - echo "Test 02: SEARCH FOR PRODUCT & VERIFY RESULTS"
    - echo "Test 03: NAVIGATE TO PRODUCT & ADD TO CART"
    - echo "═══════════════════════════════════════════════════════════"
    - npx playwright test amazon-advanced.test.js --grep "02\\.|03\\." --reporter=html --reporter=junit --reporter=line
    - echo "═══════════════════════════════════════════════════════════"
    - echo "Test execution completed - Only PlayStation 5 Search Tests"
    - echo "═══════════════════════════════════════════════════════════"
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: 30 days
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  timeout: 30 minutes
  only:
    - main
    - master
    - develop
    - merge_requests

# Generate test report
test:report:
  stage: report
  image: node:18-alpine
  dependencies:
    - test:playstation:search
  script:
    - echo "Test Report Generation"
    - echo "HTML Report location: playwright-report/index.html"
    - echo "JUnit Report location: test-results/junit.xml"
  artifacts:
    paths:
      - playwright-report/
      - test-results/
    expire_in: 90 days
  only:
    - main
    - master
    - develop
    - merge_requests
  allow_failure: true

# On-demand test run (manual trigger) - PlayStation 5 Search Tests Only
test:playstation:search:manual:
  stage: test
  image: node:18-alpine
  dependencies:
    - install:dependencies
  before_script:
    - npm ci --prefer-offline --no-audit
    - npx playwright install --with-deps chromium
  script:
    - echo "Manual PlayStation 5 Search Test Run Triggered"
    - echo "Running Tests 02 & 03 Only"
    - npx playwright test amazon-advanced.test.js --grep "02\\.|03\\." --reporter=html --reporter=junit --reporter=line
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: 30 days
  when: manual
  only:
    - main
    - master
    - develop
    - merge_requests

