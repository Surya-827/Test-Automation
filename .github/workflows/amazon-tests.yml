name: PlayStation 5 Search Test Suite

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Manual trigger option

jobs:
  test:
    name: Run PlayStation 5 Search Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: |
          echo "Installing npm dependencies..."
          npm ci
      
      - name: Install Playwright Browsers
        run: |
          echo "Installing Playwright browsers..."
          npx playwright install --with-deps chromium
      
      - name: Run PlayStation 5 Search Tests
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "Running PlayStation 5 Search Test Suite"
          echo "Test 02: SEARCH FOR PRODUCT & VERIFY RESULTS"
          echo "Test 03: NAVIGATE TO PRODUCT & ADD TO CART"
          echo "════════════════════════════════════════════════════════════"
          npx playwright test amazon-advanced.test.js --grep "02\.|03\." --reporter=html --reporter=junit
          echo "════════════════════════════════════════════════════════════"
          echo "Test execution completed - Only PlayStation 5 Search Tests"
          echo "════════════════════════════════════════════════════════════"
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Upload JUnit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: test-results/junit.xml
          retention-days: 30
      
      - name: Publish Test Report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/junit.xml
          check_name: PlayStation 5 Search Test Results
          comment_title: 'PlayStation 5 Search Tests Results'
      
      - name: Comment PR with Test Summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let summary = '## 🎮 PlayStation 5 Search Test Results\n\n';
            summary += '### Test Cases Running:\n';
            summary += '- Test 02: SEARCH FOR PRODUCT & VERIFY RESULTS\n';
            summary += '- Test 03: NAVIGATE TO PRODUCT & ADD TO CART\n\n';
            
            try {
              const junitPath = './test-results/junit.xml';
              if (fs.existsSync(junitPath)) {
                const content = fs.readFileSync(junitPath, 'utf8');
                summary += '✅ Tests completed successfully\n';
                summary += '\n**Test Report:** [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
              }
            } catch (error) {
              summary += '❌ Error reading test results\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
